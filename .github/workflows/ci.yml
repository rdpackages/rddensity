name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f R/rddensity/DESCRIPTION
          test -f Python/rddensity/pyproject.toml
          test -f Python/rddensity/setup.cfg
          test -f stata/stata.toc
          test -f stata/rddensity.pkg
          awk '{$1=$1};1' stata/stata.toc | grep -qx 'p rddensity'
          awk '$1 == "f" {print $2}' stata/rddensity.pkg | while read -r file; do
            test -f "stata/${file}"
          done

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Install Python package
        run: python -m pip install -e Python/rddensity

      - name: Check Python package
        run: |
          python -m compileall -q Python/rddensity/src/rddensity
          python -c "import rddensity; print('rddensity import OK')"

      - name: Build Python package
        run: python -m build Python/rddensity

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(
            c("ggplot2", "lpdensity"),
            repos = repos
          )
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/rddensity

      - name: Check R package
        run: R CMD check rddensity_*.tar.gz --no-manual
